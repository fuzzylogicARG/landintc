<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Access</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;

    background: radial-gradient(circle at center, #0a0a0f, #000);
}

.container {
    width:90%;
    max-width:400px;
    padding:30px;
    border-radius:15px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    box-shadow: 0 0 30px rgba(0,255,255,0.2);
}

h1 {
    font-size:28px;
    letter-spacing:2px;
    color:#00eaff;
    text-shadow:0 0 15px #00eaff;
}

p {
    opacity:0.8;
}

.hidden {
    display:none;
}

button {
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.enter-btn {
    background: linear-gradient(45deg, #00eaff, #8a2be2);
    color:white;
    box-shadow:0 0 15px #00eaff;
}

.hold-btn {
    background:#111;
    border:1px solid #00eaff;
    color:#00eaff;
}

/* barra */
.progress-bar {
    width:100%;
    height:5px;
    background:#222;
    margin-top:10px;
    border-radius:5px;
    overflow:hidden;
}

.progress {
    width:0%;
    height:100%;
    background:#00eaff;
    transition: width 2s linear;
}
</style>
</head>

<body>

<div class="container">

<!-- STEP 1 -->
<div id="step1">
    <h1>PRIVATE ACCESS</h1>
    <p>Restricted Content — Authorized Users Only</p>
    <button class="enter-btn" onclick="nextStep(2)">ENTER</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">
    <h1>VERIFY</h1>
    <p>Press and hold to verify you are human</p>

    <button class="hold-btn"
        onmousedown="startHold()"
        onmouseup="endHold()"
        onmouseleave="endHold()"
        ontouchstart="startHold()"
        ontouchend="endHold()">
        HOLD TO VERIFY
    </button>

    <div class="progress-bar">
        <div id="progress" class="progress"></div>
    </div>
</div>

<!-- STEP 3 -->
<div id="step3" class="hidden">
    <h1>AGE CHECK</h1>
    <p>You must be 18+ to enter</p>
    <button class="enter-btn" onclick="enterSite()">I AM 18+</button>
</div>

</div>

<script>

let holdTimer;
let holding = false;

function nextStep(step) {
    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.add("hidden");
    document.getElementById("step3").classList.add("hidden");

    document.getElementById("step" + step).classList.remove("hidden");
}

function startHold() {
    holding = true;

    document.getElementById("progress").style.width = "100%";

    holdTimer = setTimeout(() => {
        nextStep(3);
    }, 2000);
}

function endHold() {
    if (!holding) return;

    holding = false;

    clearTimeout(holdTimer);

    document.getElementById("progress").style.width = "0%";
}

function enterSite() {
    window.location.href = "https://thecandidverse.com/?from_gate=1";
}

</script>

</body>
</html>
